# Example settings — copy to ``config/settings.yaml`` and adjust.

jarvis:
  name: "Jarvis"
  language:
    - ar
    - en
  wake_word: hey_jarvis

models:
  default_llm: "qwen2.5:7b"
  code_llm: "qwen2.5-coder:7b"
  fast_llm: "gemma3:4b"
  deep_llm: "qwen3:8b"
  vision_llm: "llava:7b"

interfaces:
  web:
    host: "127.0.0.1"
    port: 8080
  cli:
    rich_markup: true
  telegram:
    enabled: false
    polling_timeout: 30
  gui:
    toolkit: pyqt6

paths:
  data: data
  logs: logs
  chroma: data/chroma
  sqlite: data/jarvis.db

hardware:
  gpu_vram_limit_gb: 5.5
  use_half_precision: true
  max_ollama_concurrent: 1

logging:
  level: INFO
